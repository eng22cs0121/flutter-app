name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required by Android build tools) ──────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ─────────────────────────────────────────────
      - name: Setup Flutter 3.22.x
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      # ── 4. Install dependencies ────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Run analysis (optional, won't fail the build) ───────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      # ── 6. Build release APK ───────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --no-shrink

      # ── 7. Rename APK with version + run number ────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/MediTrust-Patient-v1.0.${{ github.run_number }}.apk

      # ── 8. Upload APK as workflow artifact ─────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediTrust-Patient-APK
          path: artifacts/MediTrust-Patient-v1.0.${{ github.run_number }}.apk
          retention-days: 90

      # ── 9. Create GitHub Release with APK attached ─────────────────
      #    Only on push to main/master (not on PRs)
      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MediTrust Patient App v1.0.${{ github.run_number }}"
          body: |
            ## MediTrustChain Patient App

            ### Download & Install
            1. Download `MediTrust-Patient-v1.0.${{ github.run_number }}.apk` below
            2. On your Android phone, go to **Settings → Security → Unknown Sources** and enable it
            3. Open the downloaded APK file and tap **Install**
            4. Open **MediTrustChain** and start verifying medicines!

            ### What's included
            - QR code scanner for medicine verification
            - Blockchain verification via Sepolia testnet
            - Scan history stored locally on device
            - Works offline with Supabase database fallback

            ### Requirements
            - Android 5.0 (API 21) or higher
            - Internet connection for verification
            - Camera permission for QR scanning

            Built from commit: ${{ github.sha }}
          files: artifacts/MediTrust-Patient-v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Print download instructions ───────────────────────────
      - name: Print APK location
        run: |
          echo "========================================"
          echo "✅ APK built successfully!"
          echo "========================================"
          echo ""
          echo "📦 APK file: MediTrust-Patient-v1.0.${{ github.run_number }}.apk"
          echo ""
          echo "📥 Download options:"
          echo "1. GitHub Release (permanent link):"
          echo "   https://github.com/${{ github.repository }}/releases/tag/v1.0.${{ github.run_number }}"
          echo ""
          echo "2. Workflow Artifact (90 days):"
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "📱 To install on Android:"
          echo "   1. Enable 'Install unknown apps' in Android settings"
          echo "   2. Download and open the APK"
          echo "   3. Tap Install"
          echo "========================================"
